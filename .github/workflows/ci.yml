name: 検証

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: lint・型検査・テスト
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6

      - name: Pythonを準備
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: 依存関係をインストール
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check alembic src tests

      - name: Ruff format check
        run: python -m ruff format --check alembic src tests

      - name: mypy
        run: python -m mypy src tests

      - name: pytest
        run: python -m pytest

      - name: Docker build
        run: docker build .
